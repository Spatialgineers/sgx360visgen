<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGX 360 Experience</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #000; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <a-scene loading-screen="dotsColor: white; backgroundColor: black" 
             renderer="antialias: true; colorManagement: true;"
             vr-mode-ui="enabled: true">
        
        <a-assets>
            <video id="vid360" crossorigin="anonymous" playsinline webkit-playsinline loop muted autoplay preload="auto">
                <source src="https://video.wixstatic.com/video/fe81a7_5aedd69a9660482bb9f99de469e33c40/1080p/mp4/file.mp4" type="video/mp4">
            </video>
        </a-assets>

        <a-videosphere src="#vid360" rotation="0 -90 0"></a-videosphere>

        <a-entity id="rig" animation="property: rotation; to: 0 -360 0; loop: true; dur: 80000; easing: linear;">
            <a-entity camera look-controls="reverseMouseDrag: true" position="0 1.6 0"></a-entity>
        </a-entity>

    </a-scene>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('vid360');
            const isMobile = AFRAME.utils.device.isMobile();
            
            if (isMobile) {
                // Móvil: Pausar en el primer frame y rotar
                video.addEventListener('loadeddata', () => {
                    video.pause();
                    video.currentTime = 0.1;
                });
                video.addEventListener('playing', () => {
                    video.pause();
                });
            } else {
                // Desktop: Intentar autoplay
                video.play().catch(e => console.log("Autoplay bloqueado."));
            }
        });
    </script>
</body>
</html>
